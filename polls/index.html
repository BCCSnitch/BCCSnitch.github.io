<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Snitch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/polls/polls.css">
  </head>
  <body>
    <div id="outerContainer" class="container">
      <div id="innerContainer" class="container">
        <header>
          <div class="brand"><img src="/favicon.png" alt="The Snitch logo" class="brand-logo"><h1>The Snitch</h1></div>
          <nav id="nav">
            <button id="homeBtn" onclick="window.location.href='/'">Home</button>
            <button id="marketBtn" onclick="window.location.href='/market/'">Market</button>
            <button id="createBtn" onclick="window.location.href='/create/?type=poll'" style="display:none;">Create</button>
            <button id="account">Account</button>
            <button id="dropdown-btn" class="dropdown-btn" aria-label="Menu">
              <span></span>
              <span></span>
              <span></span>
            </button>
            <a href="http://instagram.com/bccsnitch/" style="margin-right: 15px;" target="_blank">
              <img src="/instagramIcon.png" alt="Instagram Link">
            </a>
            <div id="dropdown-menu" class="dropdown-menu">
              <button onclick="window.location.href='/'">Home</button>
              <button onclick="window.location.href='/market/'">Market</button>
              <button id="dropdown-create" onclick="window.location.href='/create/?type=poll'" style="display:none;">Create</button>
              <button id="dropdown-account">Account</button>
            </div>
          </nav>
        </header>
        <main class="layout single-column">
          <section class="main-content">
            <div class="polls-hero">
              <div class="icon">📊</div>
              <h2>Polls</h2>
              <p class="subtitle">It's definitely not gambling if there's not even fake money</p>
            </div>
            <div class="polls-section">
              <h3>Open Polls</h3>
              <div id="pollsList">
                <p class="loading-text">Loading polls...</p>
              </div>
            </div>
          </section>
        </main>
        <div id="overlay" class="overlay"></div>
        <aside class="account-sidebar" id="accountSidebar">
          <button class="close-btn" id="closeSidebar">×</button>
          <div class="account-header">
            <img id="avatar" alt="User Avatar" class="avatar">
            <h2>My Account</h2>
            <p class="email" id="userEmail"></p>
          </div>
          <button class="logout-btn" id="logout">Sign Out</button>
        </aside>
        <footer><p>© 2025 The Snitch · America's Finest News Source</p></footer>
      </div>
    </div>
    <script type="module" src="/polls/polls.js"></script>
  </body>
</html>
