<!doctype html>
<html lang="en">
    <head>
        <link rel="canonical" href="https://bccsnitch.com/" />
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>The Snitch</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/styles.css">
        <link rel="icon" type="image/png" href="/favicon.png">
    </head>

    <body>
        <div id="outerContainer" class="container">
            <div id="innerContainer" class="container">
                <header>
                    <div class="brand">
                        <h1>The Snitch</h1>
                    </div>
                    <nav id="nav">
                        <button id="login">Log In</button>
                        <button id="admin" style="display: none;">Admin Dashboard</button>
                        <button id="writer" style="display: none;">Create New Article</button>
                        <button id="market" style="display: none;" onclick="window.location.href='/bet/'">Market</button>
                        <button id="account" style="display: none;">Account</button>
                        <a href="http://instagram.com/bccsnitch/" style="margin-right: 15px;" target="_blank">
                            <img src="/instagramIcon.png" alt="Instagram Link">
                        </a>
                    </nav>
                </header>
            
                <main class="layout">
                    <section class="main-content">
                        <div class="hero"></div>
                        <div class="news-grid"></div>
                    </section>
                    <aside class="sidebar">
                        <div class="search-box">
                            <input id="search-box-input" type="text" placeholder="Search headlines...">
                        </div>
                        <div class="trending">
                            <h3>Trending</h3>
                            <ul></ul>
                        </div>
                    </aside>
                </main>

                <div id="overlay" class="overlay"></div>

                <aside class="account-sidebar" id="accountSidebar">
                    <button class="close-btn" id="closeSidebar">×</button>
                    <div class="account-header">
                        <img id="avatar" alt="User Avatar" class="avatar">
                        <h2>My Account</h2>
                        <p class="email" id="userEmail"></p>
                    </div>
                    <button class="logout-btn" id="logout">Sign Out</button>
                </aside>
            
                <footer>
                    <p>© 2025 The Snitch · America's Finest News Source</p>
                </footer>

            </div>
        </div>

        <script type="module" src="./main.js"></script>
    </body>
</html>
